services:

  mysql:
    image: mysql:8.0
    container_name: blanco-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    env_file:
      - .env
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"

  web:
    image: ramirokaffo/blanco:latest
    container_name: blanco_web
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - mysql
    ports:
      - "8000:8000"
    volumes:
      - ./media:/app/media

volumes:
  mysql_data: